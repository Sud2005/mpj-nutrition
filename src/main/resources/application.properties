# Application Name
spring.application.name=Nutrition DSS

# Server Port
server.port=8080

# H2 In-Memory Database (auto-creates, no setup needed)
spring.datasource.url=jdbc:h2:mem:nutritiondb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (visit http://localhost:8080/h2-console to view your database)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false
