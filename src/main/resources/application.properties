# Application Name
spring.application.name=Nutrition DSS

# Server Port
server.port=8080

# =============================================
# H2 In-Memory Database
# =============================================
spring.datasource.url=jdbc:h2:mem:nutritiondb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (visit http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

# =============================================
# JWT Configuration
# =============================================
jwt.secret=NutritionDSSSecretKeyForJWTTokenGeneration2024MustBeAtLeast256Bits
jwt.expiration-ms=86400000

# =============================================
# Groq LLM Configuration (Optional)
# Set GROQ_API_KEY env variable or change below
# =============================================
groq.api-key=${GROQ_API_KEY:not-configured}
groq.model=llama-3.1-8b-instant
groq.base-url=https://api.groq.com/openai/v1
groq.temperature=0.7
groq.enabled=${GROQ_ENABLED:true}
