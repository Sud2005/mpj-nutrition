<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Diet History - Nutrition DSS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">🥦 Nutrition DSS</div>
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/generate">Generate Plan</a>
        <a href="/logout" class="btn-nav-outline">Logout</a>
    </div>
</nav>

<div class="page-container">

    <div class="page-header">
        <h1>📈 Diet Plan History</h1>
        <p>All previously generated plans for <strong th:text="${user.fullName}">User</strong></p>
    </div>

    <!-- Empty state -->
    <div th:if="${plans == null || plans.isEmpty()}" class="empty-state">
        <div class="empty-icon">📋</div>
        <h3>No plans yet!</h3>
        <p>Generate your first diet plan to see it here.</p>
        <a href="/generate" class="btn btn-primary">Generate Now</a>
    </div>

    <!-- History list -->
    <div class="history-list" th:if="${plans != null && !plans.isEmpty()}">
        <div th:each="plan, iterStat : ${plans}" class="history-card">

            <div class="history-card-header">
                <div class="history-meta">
                    <span class="history-number">#<span th:text="${iterStat.count}">1</span></span>
                    <span class="history-date" th:text="${plan.formattedDate}">Date</span>
                </div>
                <div class="history-badges">
                    <span class="badge badge-bmi" th:text="'BMI: ' + ${plan.bmiAtGeneration}">BMI</span>
                    <span class="badge badge-condition" th:text="${plan.conditionAtGeneration}">Condition</span>
                    <span class="badge" th:text="${plan.approvalStatus}"
                          th:classappend="${#strings.contains(plan.approvalStatus, 'APPROVED')} ? 'badge-rec' : 
                                          (${#strings.contains(plan.approvalStatus, 'REJECTED')} ? 'badge-avoid' : 'badge-lim')">
                    </span>
                </div>
            </div>

            <!-- Parse the plan summary string for display -->
            <!-- Format stored: "RECOMMENDED:food1,food2|LIMITED:food3|AVOID:food4" -->
            <div class="history-summary" th:text="${plan.planSummary}"></div>

        </div>
    </div>

    <div class="results-actions" th:if="${plans != null && !plans.isEmpty()}">
        <a href="/generate" class="btn btn-success">🔄 Generate New Plan</a>
        <a href="/dashboard" class="btn btn-outline">← Back to Dashboard</a>
    </div>

</div>

</body>
</html>
